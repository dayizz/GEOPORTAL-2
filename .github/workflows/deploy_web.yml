name: Deploy Web a GitHub Pages

# Ejecuta en cada push a main y en workflow_dispatch manual
on:
  push:
    branches:
      - main
      - desktop/fase-1
  workflow_dispatch:

# Permisos necesarios para escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela runs anteriores pendientes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web (release)
        run: |
          flutter build web \
            --release \
            --base-href /GEOPORTAL-2/

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
